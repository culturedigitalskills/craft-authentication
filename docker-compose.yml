services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        env_file:
            - .env.production
        environment:
            DATABASE_URL: ${DATABASE_URL_APP}
            S3_ENDPOINT: ${S3_ENDPOINT}
            S3_BUCKET: ${S3_BUCKET}
            S3_ACCESS_KEY: ${S3_ACCESS_KEY}
            S3_SECRET_KEY: ${S3_SECRET_KEY}
            S3_REGION: ${S3_REGION}
        depends_on:
            - postgres
            - garage
        ports:
            - '${APP_PORT:-3000}:3000'
        restart: unless-stopped
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'curl -f http://localhost:3000/health | jq -e ''.status == "healthy"'' > /dev/null',
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    postgres:
        image: postgres:16-alpine
        restart: unless-stopped
        env_file:
            - .env.production
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - '${POSTGRES_PORT:-5432}:5432'
        volumes:
            - ./data/postgres:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
            interval: 10s
            timeout: 5s
            retries: 5

    garage:
        image: dxflrs/garage:v2.1.0
        restart: unless-stopped
        env_file:
            - .env.production
        environment:
            GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
        command: /garage server
        ports:
            - '${S3_PORT:-3900}:3900'
            - '${GARAGE_ADMIN_PORT:-3903}:3903'
        volumes:
            - ./garage.toml:/etc/garage.toml:ro
            - ./data/garage-data:/data
            - ./data/garage-meta:/meta
