services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        env_file:
            - .env.production
        environment:
            DATABASE_URL: ${DATABASE_URL_APP}
            S3_ENDPOINT: ${S3_ENDPOINT}
            S3_BUCKET: ${S3_BUCKET}
            S3_ACCESS_KEY: ${S3_ACCESS_KEY}
            S3_SECRET_KEY: ${S3_SECRET_KEY}
            S3_REGION: ${S3_REGION}
            GARAGE_ADMIN_URL: http://garage:3903
            GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:-}
            VC_PRIVATE_KEY_PATH: ${VC_PRIVATE_KEY_PATH:-/run/secrets/vc_private_key.pem}
            VC_PUBLIC_KEY_PATH: ${VC_PUBLIC_KEY_PATH:-/run/secrets/vc_public_key.pem}
        volumes:
            - ./secrets:/run/secrets:ro
        depends_on:
            postgres:
                condition: service_healthy
            garage:
                condition: service_started
        ports:
            - '${PORT:-3000}:${PORT:-3000}'
        restart: unless-stopped
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'curl -f http://localhost:${PORT:-3000}/health | jq -e ''.status == "healthy"'' > /dev/null',
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    postgres:
        image: postgres:16-alpine
        restart: unless-stopped
        env_file:
            - .env.production
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - ./data/postgres:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 120s

    garage:
        image: dxflrs/garage:v2.1.0
        restart: unless-stopped
        env_file:
            - .env.production
        environment:
            GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
        command: /garage server
        volumes:
            - ./garage.toml:/etc/garage.toml:ro
            - ./data/garage-data:/data
            - ./data/garage-meta:/meta
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:3903/health']
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s
